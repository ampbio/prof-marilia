<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marilia Yoga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #F5EFE0;
      --sand:     #E8D9BB;
      --moss:     #3B5143;
      --sage:     #6B8C6E;
      --gold:     #B8964A;
      --gold-lt:  #D4B26A;
      --bark:     #4A3728;
      --text:     #2C2416;
      --muted:    #7A6A52;
    }

    html, body {
      min-height: 100%;
      background-color: var(--cream);
      font-family: 'Jost', sans-serif;
      color: var(--text);
    }

    /* ── BACKGROUND TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(107,140,110,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(184,150,74,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── LOTUS ORNAMENT ── */
    .ornament {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      opacity: 0.75;
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .avatar-ring {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage) 0%, var(--moss) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 2px;
    }

    /* ── HEADER TEXT ── */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--moss);
      text-align: center;
      line-height: 1.1;
    }
    .name em {
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
    }

    .tagline {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    .bio {
      margin-top: 16px;
      font-size: 14.5px;
      font-weight: 300;
      line-height: 1.75;
      color: var(--bark);
      text-align: center;
      max-width: 340px;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 32px 0 28px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-lt), transparent);
    }
    .divider-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
    }

    /* ── BUTTONS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border: 1.5px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,81,67,0.14);
    }
    .btn:active {
      transform: translateY(0);
    }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-icon svg {
      width: 20px;
      height: 20px;
    }

    .btn-text {
      flex: 1;
    }
    .btn-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 2px;
    }
    .btn-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 400;
      display: block;
      line-height: 1.1;
    }

    .btn-arrow {
      opacity: 0.5;
      flex-shrink: 0;
    }

    /* WhatsApp — fundo musgo */
    .btn-whatsapp {
      background: var(--moss);
      border-color: var(--moss);
    }
    .btn-whatsapp .btn-icon {
      background: rgba(255,255,255,0.12);
    }
    .btn-whatsapp .btn-label  { color: rgba(245,239,224,0.65); }
    .btn-whatsapp .btn-title  { color: var(--cream); }
    .btn-whatsapp .btn-arrow  { color: var(--cream); }

    /* YouTube — fundo dourado */
    .btn-youtube {
      background: var(--gold);
      border-color: var(--gold);
    }
    .btn-youtube .btn-icon {
      background: rgba(255,255,255,0.15);
    }
    .btn-youtube .btn-label  { color: rgba(42,26,10,0.65); }
    .btn-youtube .btn-title  { color: var(--bark); }
    .btn-youtube .btn-arrow  { color: var(--bark); }

    /* Infoproduto — fundo areia com borda */
    .btn-produto {
      background: var(--cream);
      border-color: var(--sage);
    }
    .btn-produto .btn-icon {
      background: var(--sage);
    }
    .btn-produto .btn-label  { color: var(--muted); }
    .btn-produto .btn-title  { color: var(--moss); }
    .btn-produto .btn-arrow  { color: var(--sage); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 48px;
      text-align: center;
    }
    .footer-lotus {
      font-size: 22px;
      display: block;
      margin-bottom: 8px;
      opacity: 0.55;
    }
    .footer-text {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
    }
  </style>
</head>
<body>
<main class="page">

  <!-- Ornamento Lotus SVG -->
  <svg class="ornament" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M32 52 C32 52 12 38 12 24 C12 16 20 10 28 14 C28 10 30 8 32 8 C34 8 36 10 36 14 C44 10 52 16 52 24 C52 38 32 52 32 52Z" fill="#6B8C6E" opacity="0.25"/>
    <path d="M32 50 C32 50 16 37 16 25 C16 19 22 14 28 17 C28 13 30 11 32 11 C34 11 36 13 36 17 C42 14 48 19 48 25 C48 37 32 50 32 50Z" fill="#6B8C6E" opacity="0.4"/>
    <path d="M32 48 C32 48 20 37 20 27 C20 21 25 17 30 19 C29 15 31 13 32 13 C33 13 35 15 34 19 C39 17 44 21 44 27 C44 37 32 48 32 48Z" fill="#3B5143" opacity="0.6"/>
    <path d="M32 46 C32 46 24 37 24 29 C24 24 28 21 32 22 C36 21 40 24 40 29 C40 37 32 46 32 46Z" fill="#3B5143"/>
    <circle cx="32" cy="29" r="4" fill="#B8964A" opacity="0.8"/>
    <!-- Folhas laterais -->
    <path d="M12 36 C8 30 8 22 14 18 C14 28 18 34 24 38" fill="#6B8C6E" opacity="0.3"/>
    <path d="M52 36 C56 30 56 22 50 18 C50 28 46 34 40 38" fill="#6B8C6E" opacity="0.3"/>
  </svg>

  <!-- Avatar -->
  <div class="avatar-wrap">
    <div class="avatar-ring">
      <div class="avatar-inner">M</div>
    </div>
  </div>

  <!-- Nome -->
  <h1 class="name">Marilia<br><em>Prof. Yoga</em></h1>
  <p class="tagline">Hatha Yoga · Meditação · Filosofia</p>
  <p class="bio">Mova o corpo · Acalme a mente · Eleve a consciência.<br>Autoconhecimento através da respiração, filosofia e prática.</p>

  <!-- Divisor -->
  <div class="divider" aria-hidden="true">
    <span class="divider-line"></span>
    <span class="divider-dot"></span>
    <span class="divider-line"></span>
  </div>

  <!-- Botões -->
  <nav class="links" aria-label="Links da Marilia">

    <!-- WhatsApp -->
    <a href="#" class="btn btn-whatsapp" aria-label="Agendar aula pelo WhatsApp">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

        </svg>
      </span>
      <span class="btn-text">
        <span class="btn-label">Agendar aula</span>
        <span class="btn-title">Fale pelo WhatsApp</span>
      </span>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

    <!-- YouTube -->
    <a href="#" class="btn btn-youtube" aria-label="Canal no YouTube">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
      </span>
      <span class="btn-text">
        <span class="btn-label">Aulas gratuitas</span>
        <span class="btn-title">Canal no YouTube</span>
      </span>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

    <!-- Infoproduto -->
    <a href="#" class="btn btn-produto" aria-label="Conhecer o infoproduto">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
        </svg>
      </span>
      <span class="btn-text">
        <span class="btn-label">Curso online</span>
        <span class="btn-title">Conheça o Programa</span>
      </span>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

  </nav>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer-lotus" aria-hidden="true">🪷</span>
    <p class="footer-text">@mariliaprofyoga</p>
  </footer>

</main>
</body>
</html>
